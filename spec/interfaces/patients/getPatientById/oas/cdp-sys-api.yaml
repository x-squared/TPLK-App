    ClinicalReport:
      title: ClinicalReport
      description: |
        The findings and interpretation of procedures performed on patients, groups of patients, devices, and locations, and/or 
        specimens derived from these. The report includes clinical context such as requesting and provider information as well as 
        text-form conclusions or observations.
      required:
        - patientId
        - clinic
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              example: crp_kis_KtaEVLFWtK2mZ6GXiWV
            resourceType:
              enum:
                - ClinicalReport
              default: ClinicalReport
            category:
              description: Report category
              $ref: '#/components/schemas/Coding'
              x-valueset: https://api.usz.ch/terminology-service/value-set/DiagnosticServiceSectionCodes
              example:
                display: Physician
                system: http://terminology.hl7.org/CodeSystem/v2-0074
                code: PHY
            clinic:
              description: Clinic that sent/released the report
              type: string
              nullable: true
              enum:
                - RAO
                - DMR
                - MOH
                - PTY
                - THO
                - PNE
                - ONK
                - ''
            reportType:
              description: Code representing the type of report (e.g. SNOMED-CT code)
              $ref: '#/components/schemas/Coding'
              x-valueset: https://api.usz.ch/terminology-service/value-set/SNOMEDReportTypes
              example:
                display: Progress report
                system: http://snomed.info/sct
                code: '371532007'
            reportDateTime:
              description: Clinically relevant time/time-period for report
              $ref: '#/components/schemas/DateTime'
            issuedDateTime:
              description: Date and time this version of the report was issued
              $ref: '#/components/schemas/DateTime'
            findings:
              description: Text-form content of the report structured by sections (if available).
              type: array
              items:
                description: Section of the report
                type: object
                properties:
                  title:
                    description: Title or brief description of the finding
                    type: string
                  description:
                    description: Detailed description of the finding
            presentedForm:
              type: string
              description: Base64-encoded form of the PDF report
            patientId:
              description: Unique global identifier of the patient
              $ref: '#/components/schemas/GlobalIdentifier'
            encounterId:
              description: Unique global identifier of the encounter for billing purposes of this report
              $ref: '#/components/schemas/GlobalIdentifier'
            clinicalCaseId:
              description: Unique global identifier of the medical case related to this report
              $ref: '#/components/schemas/GlobalIdentifier'
            serviceRequestId:
              description: Unique global identifier of the service request
              $ref: '#/components/schemas/GlobalIdentifier'
            specimenId:
              description: Unique global identifier of the specimen used for the report
              $ref: '#/components/schemas/GlobalIdentifier'
            performingPracticionerId:
              description: Unique global identifier of the responsible diagnostic service provider
              $ref: '#/components/schemas/GlobalIdentifier'
            resultsInterpretingPracticionerId:
              description: Unique global identifier of the primary results interpreter
              $ref: '#/components/schemas/GlobalIdentifier'
            approvingPracticionerId:
              description: Unique global identifier of the approving practitioner
              $ref: '#/components/schemas/GlobalIdentifier'
            media:
              type: array
              description: Key images associated with this report
              items:
                type: object
                properties:
                  link:
                    type: string
                    format: url
                    description: Reference to the image source
                    x-fhirpath: '%context.link'
                  comment:
                    type: string
                    description: Comment about the image (e.g. explanation)
                    x-fhirpath: '%context.comment'
