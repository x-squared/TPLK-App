  parameters:
    patientIdPathParam:
      name: patientId
      description: The global unique identifier of the patient
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/GlobalIdentifier'
        example: pat_sap_MDAwMTIzMTI0
    dateFromParam:
      in: query
      name: dateFrom
      description: Earliest date to consider (based on context).
      schema:
        type: string
        format: date
      example: '2025-03-31'
    dateToParam:
      in: query
      name: dateTo
      description: Latest date to consider (based on context).
      schema:
        type: string
        format: date
      example: '2025-06-30'
    clinicalReportClinic:
      name: clinicalReportClinic
      description: |
        The acronym of the clinic that sent/released the clinical report
            * `RAO` - Radiooncology
            * `DMR` - Radiology
            * `MOH` - Medical Oncology and Hematology
            * `PTY` - Pathology
            * `THO` - Thorax
            * `PNE` - Pneumology
      in: query
      schema:
        type: string
        enum:
          - RAO
          - DMR
          - MOH
          - PTY
          - THO
          - PNE
      example: MOH
    redcapPatientFeedIdPathParam:
      name: redcapPatientFeedId
      description: Unique ID of recap patient feed message
      in: path
      required: true
      schema:
        type: integer
      example: 3865
  examples:
    Patient:
      value:
        id: pat_sap_MDAwMTIzMTI0
        ehrId: '123456'
        resourceType: Patient
        resourceName: Patient
        url: https://api.usz.ch/patient/pat_sap_MDAwMTIzMTI0
        ahvNumber: 756.1234.5678.90
        gender: male
        name: Markus Stephan
        surname: Muster
        addresses:
          - street: Bahnhofstrasse 11
            postalCode: '8001'
            city: Zurich
            state: Zurich
            country: Switzerland
        birthdate: '2018-04-13'
        communications:
          - communicationType: email
            use: private
            value: muster@mail.ch
          - communicationType: phone
            use: mobile
            value: +41 79 333 22 11
        deceased: false
    Chronology:
      value:
        - id: con_kis_001
          resourceType: Condition
          resourceName: Condition
          resourceTimestamp: '2025-06-20T08:30:00Z'
          summary: Diagnosed stage IIIA non-small cell lung cancer in upper right lobe
        - id: pro_kis_005E
          resourceType: Procedure
