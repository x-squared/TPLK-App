        - $ref: '#/components/schemas/PhysicalUnit'
    Observation:
      title: Observation
      description: Measurements and simple assertions made about a patient, device or other subject.
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required:
            - patientId
            - observationType
          properties:
            id:
              example: obs_kis_KtaEVaAwCNEoYtqQ3td
            resourceType:
              enum:
                - Observation
              default: Observation
            category:
              description: A category assigned to the observation
              type: string
              enum:
                - social-history
                - vital-signs
                - imaging
                - laboratory
                - procedure
                - survey
                - exam
                - therapy
                - activity
              example: laboratory
            observationType:
              $ref: '#/components/schemas/Coding'
              description: Coded classification of the specific observation type. Serves as a discriminator between observations.
            bodySite:
              $ref: '#/components/schemas/Coding'
              description: Anatomical location related to this observation (if relevant)
              x-fhirpath: Observation.bodySite.coding
              x-valueset: https://api.usz.ch/terminology-service/value-set/SNOMEDCTBodyStructures
              example:
                display: Left parietal lobe
                system: http://snomed.info/sct
                code: '9003000'
            date:
              $ref: '#/components/schemas/DateTime'
              description: Clinically relevant date for the observation
              x-fhirpath: Observation.effectiveDateTime
            interpretation:
              $ref: '#/components/schemas/Coding'
              description: A categorical assessment of an observation value
              x-fhirpath: Observation.interpretation.coding
              x-valueset: https://api.usz.ch/terminology-service/value-set/ObservationInterpretationCodes
              example:
                display: Significantly high
                system: http://terminology.hl7.org/CodeSystem/v3-ObservationInterpretation
                code: HU
            issueDate:
              description: Date this version was published
              $ref: '#/components/schemas/Date'
            method:
              $ref: '#/components/schemas/Coding'
              description: Indicates the mechanism used to perform the observation.
              x-fhirpath: Observation.method.coding
              x-valueset: https://api.usz.ch/terminology-service/value-set/ObservationMethods
              example:
                display: Molecular genetics
                system: "http://snomed.info/sct\t"
                code: '708068002'
            observedValue:
              description: Actual value of the observation (type is case-specific)
              anyOf:
                - type: string
                - type: integer
                - type: number
                - type: boolean
                - $ref: '#/components/schemas/Coding'
                - $ref: '#/components/schemas/Date'
                - $ref: '#/components/schemas/DateTime'
                - $ref: '#/components/schemas/Period'
                - $ref: '#/components/schemas/Quantity'
                - $ref: '#/components/schemas/Range'
                - $ref: '#/components/schemas/Ratio'
                - $ref: '#/components/schemas/GlobalIdentifier'
            patientId:
              description: Unique global identifier of the patient
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Observation.subject.identifier.value
            encounterId:
              description: Unique global identifier of the encounter for billing purposes of this observation
              $ref: '#/components/schemas/GlobalIdentifier'
            clinicalCaseId:
              description: Unique global identifier of the medical case related to this observation
              $ref: '#/components/schemas/GlobalIdentifier'
            performingPractitionerId:
              description: Unique global identifier of the performing practitioner
              $ref: '#/components/schemas/GlobalIdentifier'
            specimenId:
              description: Unique global identifier of the specimen used for the observation
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Observation.specimen.identifier.value
