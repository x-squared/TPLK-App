openapi: 3.0.0
info:
  version: v1
  title: Clinical Data Platform API - USZ
  description: This API provides access to Clinical Data Platform (CDP) to provide a structured overview for clinical purposes.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api.usz.ch
    description: USZ Clinical Data Platform System API
security:
  - client_id: []
    client_secret: []
tags: []
paths:
  /patients/{patientId}:
    get:
      operationId: getPatientById
      tags:
        - Patient
      summary: Get Patient by ID
      description: Gets a patient by its ID.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
              examples:
                Patient:
                  $ref: '#/components/examples/Patient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/chronology:
    get:
      operationId: getPatientChronology
      tags:
        - Patient
      summary: Get all chronological relevant health events of a patient.
      description: Get all chronological relevant health events of a patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
              examples:
                Chronology:
                  $ref: '#/components/examples/Chronology'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/conditions:
    get:
      operationId: getPatientConditions
      tags:
        - Conditions
      summary: Get conditions
      description: Gets all conditions matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Condition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/conditions/{conditionId}:
    get:
      operationId: getPatientConditionById
      tags:
        - Conditions
      summary: Get condition by ID
      description: Gets a condition by its ID for a given cancer patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: conditionId
          description: Condition ID
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
            example: kis_con_M2FjOS00Zm
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Condition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/procedures:
    get:
      operationId: getPatientProcedures
      tags:
        - Treatments
      summary: Get procedures for a patient
      description: Get all procedures (surgeries, interventions, etc.) matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Procedure'
              examples:
                AllProcedures:
                  $ref: '#/components/examples/Procedures'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/procedures/{procedureId}:
    get:
      operationId: getPatientProcedureById
      tags:
        - Treatments
      summary: Get patient procedure by ID
      description: Gets a procedure by its ID for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: procedureId
          description: Procedure ID
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
            example: kis_pro_M2FjOS00Zm
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Procedure'
              examples:
                Lobectomy:
                  $ref: '#/components/examples/Procedure_lobectomy'
                Biopsy:
                  $ref: '#/components/examples/Procedure_biopsy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/care-plans:
    get:
      operationId: getPatientCarePlans
      tags:
        - Treatments
      summary: Get care plans for a patient
      description: Get all care plans matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
        - name: category
          description: |
            The SNOMED code categorizing the type of care plan
                * `736249004` - Radiotherapy Care Plan
                * `736401008` - Chemotherapy Care Plan
          in: query
          schema:
            type: string
            enum:
              - '736249004'
              - '736401008'
          example: '736249004'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/RadiotherapyCarePlan'
                    - $ref: '#/components/schemas/ChemotherapyCarePlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/care-plans/{carePlanId}:
    get:
      operationId: getPatientCarePlanById
      tags:
        - Treatments
      summary: Gets a care plan by ID for a given patient.
      description: Gets a care plan by its ID for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: carePlanId
          description: Care plan Id.
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/RadiotherapyCarePlan'
                  - $ref: '#/components/schemas/ChemotherapyCarePlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/medication-administrations:
    get:
      operationId: getPatientMedicationAdministrations
      tags:
        - Treatments
      summary: Get all medication adminsitrations matching the query for a given patient.
      description: Get all medication adminsitrations matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MedicationAdministration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/medication-administrations/{medicationAdministrationId}:
    get:
      operationId: getPatientMedicationAdministrationById
      tags:
        - Treatments
      summary: Get a patient's medication adminsitrations by its Id.
      description: Get a patient's medication adminsitrations by its Id.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - name: medicationAdministrationId
          description: The global unique identifier of the medication administration
          required: true
          in: path
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationAdministration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/adverse-events:
    get:
      operationId: getPatientAdverseEvents
      tags:
        - Adverse Events
      summary: Get adverse events
      description: Get all adverse events matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/RadiotherapyAdverseEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/adverse-events/{adverseEventId}:
    get:
      operationId: getPatientAdverseEventById
      tags:
        - adverse events
      summary: Get adverse event by ID
      description: Get adverse event by ID.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: adverseEventId
          description: adverse event ID
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
            example: pro_kis_M2FjOSXXsfad
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/RadiotherapyAdverseEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/clinical-reports:
    get:
      operationId: getPatientClinicalReports
      tags:
        - Clinical Reports
      summary: Get clinical reports
      description: Get all clinical reports matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/clinicalReportClinic'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/DischargeReport'
                    - $ref: '#/components/schemas/ClinicalProgressReport'
                    - $ref: '#/components/schemas/MedicalConsultationReport'
              examples:
                AllClinicalReports:
                  $ref: '#/components/examples/ClinicalReports'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/clinical-reports/{clinicalReportId}:
    get:
      operationId: getPatientClinicalReportById
      tags:
        - Clinical Reports
      summary: Get clinical report by ID
      description: Get all clinical reports by ID.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: clinicalReportId
          description: Clinical report ID
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
            example: crp_kis_M2FjOSXXsfad
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/DischargeReport'
                  - $ref: '#/components/schemas/ClinicalProgressReport'
                  - $ref: '#/components/schemas/MedicalConsultationReport'
              examples:
                Radiology:
                  $ref: '#/components/examples/ClinicalReport_radiology'
                Pathology:
                  $ref: '#/components/examples/ClinicalReport_pathology'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/performance-scores:
    get:
      operationId: getPatientPerformanceScores
      tags:
        - Scores
      summary: Get performance scores for a patient
      description: Get all performance scores (ECOG, Karnosfky, etc.) matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ECOG'
              examples:
                ECOGs:
                  $ref: '#/components/examples/ECOGS'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/performance-scores/{performanceScoreId}:
    get:
      operationId: getPatientPerformanceScoreById
      tags:
        - Scores
      summary: Get performance score by ID for a patient
      description: Get a performance score (ECOG, Karnosfky, etc.) by ID for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: performanceScoreId
          description: Performace score ID
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
            example: kis_obs_M2FjOS00Zm
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ECOG'
              examples:
                ECOG1:
                  $ref: '#/components/examples/ECOG_1'
                ECOG2:
                  $ref: '#/components/examples/ECOG_2'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/vitals:
    get:
      operationId: getPatientVitalSigns
      tags:
        - Observations
      summary: Get vital signs
      description: Get all vital signs matching the query for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
      responses:
        '200':
