        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /patients/{patientId}/vitals/{vitalSignId}:
    get:
      operationId: getPatientVitalSignById
      tags:
        - Treatments
      summary: Get vitals sign by ID for a patient
      description: Gets a vitals sign by its ID for a given patient.
      parameters:
        - $ref: '#/components/parameters/patientIdPathParam'
        - in: path
          name: vitalSignId
          description: Vitals ID
          required: true
          schema:
            $ref: '#/components/schemas/GlobalIdentifier'
            example: kis_obs_M2Fj0YafTI
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VitalSign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /redcap-patient-feeds/{redcapPatientFeedId}:
    delete:
      tags:
        - redcap-patient-feed
      summary: Delete Redcap Patient Feed
      description: Delete one Redcap Patient Feed Message by ID
      operationId: deleteRedcalPatientFeed
      parameters:
        - $ref: '#/components/parameters/redcapPatientFeedIdPathParam'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /redcap-patient-feeds:
    get:
      operationId: getRedcapPatientFeeds
      tags:
        - RedcapPatientFeeds
      summary: Get Redcap Patient Feeds
      description: Gets all open RedcapPatientFeed Messages.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RedcapPatientFeed'
              examples:
                AllRedcapPatientFeeds:
                  $ref: '#/components/examples/RedcapPatientFeeds'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /redcap-instruments:
    post:
      tags:
        - redcap-instruments
      summary: Post REDCap instrument
      description: Write REDCap Instrument Record
      operationId: writeRedcapInstrument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    client_id:
      type: apiKey
      in: header
      name: client_id
      description: Client ID Enforcement policy
    client_secret:
      type: apiKey
      in: header
      name: client_secret
      description: Client Secret Enforcement policy
  schemas:
    GlobalIdentifier:
      title: Global USZ Identifier
      type: string
      pattern: ^([a-z]{2,3})_(?:([a-z]{2,3})_)?([a-zA-Z0-9]+)$
      readOnly: true
      description: |
        The universal unique (machine) identifier of the resource: 

          `{resourceType}_[{sourceSystem}_]{base58Id}`

        Components:
          - `resourceType`: The type of resource being identified (e.g. `obs` or `cnd`)
          - `sourceSystem`: (optional) The name/label of the source system of the data (e.g. `ks` or `sp`)
          - `base58Id`: A base58-endocoded representation of the internal unique ID of the data element (preferrably a UUID). 

          This identification should in particular be used for CRUD operations.
      example: pat_ish_9EGJCxbxRGT
    DateTime:
      title: DateTime
      type: string
      format: date-time
      example: '2018-11-13T20:20:39+00:00'
    Period:
      title: Period
      type: object
      description: A time period defined by a start and end date/time.
      properties:
        start:
          $ref: '#/components/schemas/DateTime'
          x-fhirpath: '%context.start'
          example: 2018-04-13T16:00+01:00
        end:
          $ref: '#/components/schemas/DateTime'
          x-fhirpath: '%context.end'
          example: 2019-05-14T12:00+01:00
    Resource:
      title: Resource
      type: object
      required:
        - id
        - resourceType
        - resourceName
      properties:
        id:
          $ref: '#/components/schemas/GlobalIdentifier'
        resourceType:
          type: string
          description: Type of resource to discriminate between resources. Typically preset by the schema definition.
          enum:
            - AdverseEvent
            - Condition
            - Encounter
            - Observation
            - Patient
            - Practitioner
            - Specimen
            - ClinicalCase
            - MedicationAdministration
            - ClinicalReport
            - ServiceRequest
            - Procedure
            - CarePlan
            - Other
        resourceName:
          type: string
        resourceTimestamp:
          description: Time stamp when resource is intended for chronological purposes.
          oneOf:
            - type: string
              format: date-time
            - $ref: '#/components/schemas/Period'
        summary:
          type: string
        url:
          type: string
          format: url
          description: Endpoint where the resource came from.
    Address:
      type: object
      properties:
        country:
          type: string
          example: Switzerland
        city:
          type: string
          example: Zurich
        state:
          type: string
          example: Zurich
        postalCode:
          type: string
          example: '8019'
        street:
          type: string
          example: Rosengartenstrasse 22
        addressSupplement:
          type: string
          example: c/o Amtsvormundbüro 33
    Date:
      title: Date
      type: string
      description: A date as used in human communication. The format is YYYY-MM-DD, eg. 1905-08-23. There SHALL be no time zone. Dates SHALL be valid dates
      format: date
      example: '2018-04-13'
    Communication:
      type: object
      required:
        - communicationType
        - use
        - value
      properties:
        communicationType:
          type: string
          enum:
            - phone
            - email
            - fax
            - pager
            - url
            - sms
            - other
          example: email
        use:
          type: string
          enum:
            - work
            - private
            - home
            - temp
            - old
            - holiday
            - mobile
            - other
          example: private
        value:
          type: string
          example: muster@mail.ch
    Patient:
      title: Patient
      description: |
        Demographics and other administrative information about an individual receiving
        care or other health-related services.
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required:
            - ehrId
          properties:
            resourceType:
              enum:
                - Patient
              default: Patient
            ehrId:
              description: Internal EHR identifier of the patient (e.g. KISIM ID)
              type: string
              example: '123456789'
            ahvNumber:
              description: AHV number of the patient
              type: string
              example: 756.1234.5678.90
            gender:
              description: Gender for administrative purposes
              type: string
              enum:
                - male
                - female
                - other
              example: male
            name:
              description: Name(s) associated with the patient (including middle names, space-delimited)
              type: string
              example: Markus Stephan
            surname:
              description: Surname(s) associated with the patient (space-delimited)
              type: string
              example: Muster
            addresses:
              description: Addresses of the patient
              type: array
              items:
                $ref: '#/components/schemas/Address'
            birthdate:
              description: Date of birth of the patient
              $ref: '#/components/schemas/Date'
            communications:
              description: Communications details for the patient
              type: array
              items:
                $ref: '#/components/schemas/Communication'
            deceased:
              description: Flag indicating the vital status of the patient
              type: boolean
              example: false
    CommonErrorResponse:
      title: CommonErrorResponse
      type: object
      description: Common error response.
      required:
        - message
        - correlationId
        - createdAt
      properties:
        message:
          type: string
          description: Message of the error response.
          example: This is the general problem description
        correlationId:
          type: string
        createdAt:
          $ref: '#/components/schemas/DateTime'
    Coding:
      title: Coding
      type: object
      description: A Coding is a representation of a defined concept using a symbol from a defined code system
      required:
        - system
        - code
      properties:
        system:
          type: string
          description: Canonical URL/UUID of the code system
          x-fhirpath: '%context.system'
        code:
          type: string
          description: Preset string/code defined by the code system
          x-fhirpath: '%context.code'
        display:
          type: string
          description: Human-readable representation of the code given by the system
          x-fhirpath: '%context.display'
        version:
          type: string
          description: Version identifier of the code system
          x-fhirpath: '%context.version'
    Condition:
      title: Condition
      description: |
        A clinical condition, problem, diagnosis, or other event, situation, issue, or clinical 
        concept that has risen to a level of concern. At USZ a condition/diagnosis can cover multiple standardized coded conditions.
      required:
        - patientId
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              example: cnd_kis_KtaEVLFWtK2mZ6GXiWV
            resourceType:
              enum:
                - Condition
              default: Condition
            clinicalStatus:
              description: The clinical status of the condition.
              type: string
              x-fhirpath: Condition.clinicalStatus
              enum:
                - active
                - recurrence
                - relapse
                - inactive
                - remission
                - resolved
              example: active
            verificationStatus:
              description: The verification status to support the clinical status of the condition.
              type: string
              x-fhirpath: Condition.verificationStatus
              enum:
                - active
                - deleted
                - partial
                - completed
                - provisional
                - formal-complete
                - content-complete
              example: completed
            diagnosis:
              description: Human-redable text-based description of the diagnosis
              type: string
            notes:
              description: Comments left by the responsible practitioner
              type: string
            classifications:
              description: |
                Identification of the condition, problem or diagnosis (Coded - ICD10, ICD-O-3, SNOMEDCT).
                The binding to a specific valueset is left for derived schemas or the implementer if not specified.
              type: array
              items:
                $ref: '#/components/schemas/Coding'
                x-valueset: null
                example:
                  display: Fracture of lunate
                  system: "http://snomed.info/sct\t"
                  code: '2012002'
            severity:
              description: A subjective assessment of the severity of the condition as evaluated by the clinician.
              type: string
              enum:
                - severe
                - moderate
                - mild
              example: moderate
            bodySites:
              description: |
                The anatomical locations where this condition manifests itself (if relevant)
                Coding System:
              type: array
              items:
                $ref: '#/components/schemas/Coding'
                x-valueset: http://hl7.org/fhir/ValueSet/body-site
            stagings:
              description: Clinical stage or grade of a condition. May include formal severity assessments.
              type: array
              items:
                $ref: '#/components/schemas/Coding'
            onsetDate:
              description: Estimated or actual date or date-time the condition began, in the opinion of the clinician.
              $ref: '#/components/schemas/Date'
              x-fhirpath: Condition.onsetDate
            abatementDate:
              description: The date or estimated date that the condition resolved or went into remission.
              $ref: '#/components/schemas/Date'
            recordedDate:
              description: Date record was first recorded
              $ref: '#/components/schemas/Date'
            patientId:
              description: Unique global identifier of the patient
              $ref: '#/components/schemas/GlobalIdentifier'
            encounterId:
              description: Unique global identifier of the encounter for billing purposes of this condition
              $ref: '#/components/schemas/GlobalIdentifier'
            clinicalCaseId:
              description: Unique global identifier of the medical case related to this condition
              $ref: '#/components/schemas/GlobalIdentifier'
            recordingPractitionerId:
              description: Unique global identifier of the recording practitioner (if relevant)
              $ref: '#/components/schemas/GlobalIdentifier'
            assertingPractitionerId:
              description: Unique global identifier of the asserting practitioner (if relevant)
              $ref: '#/components/schemas/GlobalIdentifier'
    Procedure:
      title: Procedure
      description: |
        An action that is or was performed on or for a patient, practitioner, device, organization, or location. 
        For example, this can be a physical intervention on a patient like an operation, or less invasive like long term services, counseling, or hypnotherapy. 
        This can be a quality or safety inspection for a location, organization, or device. This can be an accreditation procedure on a practitioner for licensing.
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              example: proc_kis_KtaEVLFWtK2mZ6GXiWV
            resourceType:
              enum:
                - Procedure
              default: Procedure
            category:
              description: Broad classification of the procedure
              enum:
                - other
                - surgical
                - nuclear
                - imaging
                - diagnostic
                - psychiatric
                - rehabilitation
                - measurement
            procedureType:
              description: Code identifying the procedure
              $ref: '#/components/schemas/Coding'
              x-valueset: null
              example:
                display: Destruction of lesion of liver
                system: http://snomed.info/sct
                code: '5415002'
            dateTime:
              description: Date/time when the procedure occurred
              $ref: '#/components/schemas/DateTime'
            targetedBodySites:
              description: Targeted natomical locations
              type: array
              items:
                $ref: '#/components/schemas/Coding'
                x-fhirpath: Observation.bodySite.coding
                x-valueset: https://api.usz.ch/terminology-service/value-set/SNOMEDCTBodyStructures
                example:
                  display: Left parietal lobe
                  system: http://snomed.info/sct
                  code: '9003000'
            outcome:
              description: Outcome of the procedure
              type: string
              enum:
                - successful
                - unsuccessful
                - partially successful
              example: successful
            reports:
              description: |
                Any diagnostic reports resulting from this procedure. Specified as API endpoint URLs where 
                the structured `ClinicalReport` objects for a specific procedure are served (if available).
              type: array
              items:
                type: string
                format: url
            notes:
              description: Additional information/comments about the procedure
              type: string
            patientId:
              description: Unique global identifier of the patient
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Procedure.subject.identifier.value
            encounterId:
              description: Unique global identifier of the encounter for billing purposes of this procedure
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Procedure.encounter.identifier.value
            clinicalCaseId:
              description: Unique global identifier of the clinical case related to this procedure
              $ref: '#/components/schemas/GlobalIdentifier'
            performingPractitionerId:
              description: Unique global identifier of the performing practitioner
              $ref: '#/components/schemas/GlobalIdentifier'
            serviceRequestId:
              description: Unique global identifier of the service request
              $ref: '#/components/schemas/GlobalIdentifier'
            treatedConditionId:
              description: Unique global identifier of the condition/problem treated by this procedure
              $ref: '#/components/schemas/GlobalIdentifier'
    CarePlan:
      title: CarePlan
      description: |
        Describes the intention of how one or more practitioners intend to deliver care for a particular patient, group or community 
        for a period of time, possibly limited to care for a specific condition or set of conditions.
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            resourceType:
              type: string
              enum:
                - CarePlan
              default: CarePlan
            id:
              type: string
              example: cpln_kis_KtaEVLFWtK2mZ6GXiWV
            status:
              type: string
              enum:
                - draft
                - active
                - completed
                - entered-in-error
                - cancelled
              description: The current state of the care plan.
            intent:
              type: string
              enum:
                - plan
                - order
                - proposal
              description: The intention of the care plan.
            category:
              $ref: '#/components/schemas/Coding'
              description: Identifies the category of the care plan.
            title:
              type: string
              description: A short title for the care plan.
            description:
              type: string
              description: A description of the care plan.
            patientId:
              description: Unique global identifier of the patient
              $ref: '#/components/schemas/GlobalIdentifier'
            encounterId:
              description: Unique global identifier of the encounter during which this care plan was created
              $ref: '#/components/schemas/GlobalIdentifier'
            period:
              $ref: '#/components/schemas/Period'
              description: The time period over which the care plan is intended to be in effect.
            created:
              type: string
              format: dateTime
              description: The date the care plan was created.
            modified:
              type: string
              format: dateTime
              description: The date the care plan was last modified.
            authorId:
              $ref: '#/components/schemas/GlobalIdentifier'
              description: Unique global identifier of the person or organization responsible for the care plan.
            clinic:
              description: Clinic that released the care plan
              type: string
            careTeams:
              type: array
              items:
                $ref: '#/components/schemas/GlobalIdentifier'
              description: Identifies the individuals or organizations involved in the care plan.
            addressesConditionsIds:
              type: array
              items:
                $ref: '#/components/schemas/GlobalIdentifier'
              description: Conditions addressed by the care plan.
            note:
              type: string
              description: Any additional notes about the care plan.
          required:
            - resourceType
            - resourceName
            - patientId
    PhysicalUnit:
      title: Physical Unit
      description: Machine- and human-readable representation of a physical unit based on the UCUM system
      type: object
      properties:
        unit:
          description: Code representing the physical unit (must be a valid UCUM unit code)
          type: string
          x-valueset: ' https://api.usz.ch/terminology-service/code-system/UCUM'
          x-fhirpath: '%context.code'
          example: u[iU]/ml
        unitDescription:
          description: Human readeable form of the unit (as given by UCUM)
          type: string
          x-fhirpath: '%context.unit'
          example: MicroInternationalUnitsPerMilliLiter
    Quantity:
      title: Quantity
      description: A measured amount (or an amount that can potentially be measured).
      type: object
      required:
        - value
      allOf:
        - properties:
            value:
              description: Numerical component of the quantity (integer or float)
              type: number
              x-fhirpath: '%context.value'
              example: 2.5
        - $ref: '#/components/schemas/PhysicalUnit'
    RadiotherapyCarePlan:
      title: RadiotherapyCarePlan
      description: |
        A a treatment approach that combines two or more therapeutic modalities, such as surgery,
        chemotherapy, radiation therapy, and immunotherapy, to provide a comprehensive and 
        personalized treatment plan for patients with cancer.
      allOf:
        - $ref: '#/components/schemas/CarePlan'
        - type: object
          required:
            - resourceName
          properties:
            resourceName:
              enum:
                - RadiotherapyCarePlan
              default: RadiotherapyCarePlan
            category:
              properties:
                code:
                  enum:
                    - '736249004'
                  default: '736249004'
                display:
                  enum:
                    - Radiotherapy care plan
                  default: Radiotherapy care plan
                system:
                  enum:
                    - http://snomed.info/sct
                  default: http://snomed.info/sct
            intent:
              enum:
                - order
              default: order
            treatmentIntent:
              type: string
              enum:
                - curative
                - palliative
              description: The therapeutic intent of the radiotherapy
            treatmentPriority:
              type: string
              enum:
                - low
                - intermediate
                - high
              description: Priorization of the radiotherapy treatment
            isRadiochemotherapy:
              type: boolean
              description: Whether the radiotherapy is to be administered along chemotherapy
            chemotherapyLocation:
              type: string
              description: Where the chemotherapy is to be administered (if applicable)
            chemotherapeuticAgents:
              type: string
              description: Chemotherapeutic agents to be administered along radiotherapy (if applicable)
            paceMaker:
              type: boolean
              description: Whether the patient has a pace maker
            dentalCare:
              type: boolean
              description: Whether the patient requires dental care
            preRadioationExposure:
              type: boolean
              description: Whether the patient has been exposed to radiation prior to starting the main course of radiotherapy
            phases:
              type: array
              items:
                type: object
                properties:
                  phaseSequence:
                    type: integer
                    description: Ordinal number of the radiotherapy course phase
                  description:
                    type: string
                    description: Description of the radiotherapy phase
                  fractions:
                    description: Total number of fractions delivered to the volume in the body
                    type: integer
                  volume:
                    type: string
                    description: Irradiated volume in the body.
                  fractionDose:
                    description: Physical radiation dose to be delivered to the volume in the body during a complete fraction
                    $ref: '#/components/schemas/Quantity'
                  totalDose:
                    description: Physical radiation dose to be delivered to the volume in the body during a complete phase
                    $ref: '#/components/schemas/Quantity'
                  cumulativeDose:
                    description: Physical radiation dose to be delivered cumulatively to the volume in the body over the complete course of radiotherapy
                    $ref: '#/components/schemas/Quantity'
                  goal:
                    type: string
                    description: The overall goal of the radiotherapy course phase
                  imaging:
                    type: string
                    description: Imaging selection relevant for the phase
                  plans:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the radiotherapy phase delivery plan
                        planningTargetVolume:
                          type: string
                          description: Planning target volume (PTV)
                        fractionDose:
                          description: Physical radiation dose to be delivered to the volume in the body during a complete fraction
                          $ref: '#/components/schemas/Quantity'
                        totalDose:
                          description: Physical radiation dose to be delivered to the volume in the body during a complete phase
                          $ref: '#/components/schemas/Quantity'
                        cumulativeDose:
                          description: Physical radiation dose to be delivered cumulatively to the volume in the body over the complete course of radiotherapy
                          $ref: '#/components/schemas/Quantity'
                        note:
                          type: string
                          description: Any additional information on the plan
    ChemotherapyCarePlan:
      title: ChemotherapyCarePlan
      description: |
        A a treatment approach that combines two or more therapeutic modalities, such as surgery,
        chemotherapy, radiation therapy, and immunotherapy, to provide a comprehensive and 
        personalized treatment plan for patients with cancer.
      allOf:
        - $ref: '#/components/schemas/CarePlan'
        - type: object
          required:
            - resourceName
          properties:
            resourceName:
              enum:
                - ChemotherapyCarePlan
              default: ChemotherapyCarePlan
            category:
              properties:
                code:
                  enum:
                    - '736401008'
                  default: '736401008'
                display:
                  enum:
                    - Chemotherapy care plan
                  default: Chemotherapy care plan
                system:
                  enum:
                    - http://snomed.info/sct
                  default: http://snomed.info/sct
            intent:
              enum:
                - order
              default: order
            station:
              type: string
              description: Station responsible for the chemotherapy
            approvalLevel:
              type: integer
            currentCycle:
              type: integer
              description: The current cycle of overall chemotherapy being planned
            protocolCycle:
              type: integer
              description: A reference to the protocol cycle being applied/repeated
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: Status of the schema
                created:
                  type: string
                  format: dateTime
                  description: Date/time when the schema was created
                authorId:
                  $ref: '#/components/schemas/GlobalIdentifier'
                  description: Unique global identifier of the person that last authored the schema.
                modified:
                  type: string
                  format: dateTime
                  description: Date/time when the schema was last modified
                name:
                  type: string
                  description: Title of the schema
            protocol:
              type: object
              properties:
                id:
                  type: string
                  description: Protocol ID
                version:
                  type: string
                  description: Version of the protocol contents
                created:
                  type: string
                  format: dateTime
                  description: Date/time when the protocol was created
                authorId:
                  $ref: '#/components/schemas/GlobalIdentifier'
                  description: Unique global identifier of the person that last authored the protocol.
                modified:
                  type: string
                  format: dateTime
                  description: Date/time when the protocol was last modified
                approved:
                  type: boolean
                  description: Whether the protocol has been approved
                title:
                  type: string
                  description: Title of the protocol
                summary:
                  type: string
                  description: Free-text brief description of the protocol
                description:
                  type: string
                  description: Free-text detailed description of the protocol
                status:
                  type: string
                  description: Status of the protocol
                category:
                  type: string
                  description: Classification of the protocol
                notes:
                  type: string
                  description: Free-text notes relevant to the protocol content
                cycles:
                  type: array
                  items:
                    type: object
                    properties:
                      cycleSequence:
                        type: integer
                        description: Ordinal describing the sequential position of the cycle within the protocol
                      description:
                        type: string
                        description: Description of the protocol cycle
    Ratio:
      title: Ratio
      type: object
      description: A ratio between two values/quantities
      allOf:
        - properties:
            numerator:
              description: The numerator value
              type: number
            denominator:
              description: The denominator value
              type: number
        - $ref: '#/components/schemas/PhysicalUnit'
    Medication:
      title: Medication
      type: object
      required:
        - classification
      properties:
        text:
          description: Human readable summary of the medication
          type: string
        classification:
          description: Set of codes that specify this medication
          type: array
          items:
            description: Standard medication code such as a code from RxNorm, SNOMED CT, IDMP, ATC, etc.
            $ref: '#/components/schemas/Coding'
            x-valueset: https://api.usz.ch/terminology-service/value-set/medication-codes
          example:
            - display: Carboplatin
              system: http://www.nlm.nih.gov/research/umls/rxnorm
              code: '40048'
            - display: Pemetrexed
              system: http://www.nlm.nih.gov/research/umls/rxnorm
              code: '68446'
        ingeredients:
          description: Set of codes that specify the chemical/biological ingredients that are part of the medication.
          type: array
          items:
            description: Standard ingredient code such as a code from RxNorm, SNOMED CT, IDMP, ATC, etc.
            $ref: '#/components/schemas/Coding'
            x-valueset: https://api.usz.ch/terminology-service/value-set/medication-ingredients-codes
          example:
            - display: Carboplatin
              system: http://www.nlm.nih.gov/research/umls/rxnorm
              code: '40048'
            - display: Pemetrexed tromethamine anhydrous
              system: http://www.nlm.nih.gov/research/umls/rxnorm
              code: '2604776'
        form:
          description: A code representing the physical form of the medication (powder, tablet, liquid, etc.).
          $ref: '#/components/schemas/Coding'
          x-valueset: https://api.usz.ch/terminology-service/value-set/medication-form-codes
        amount:
          description: Specific amount of the drug in the packaged product.
          $ref: '#/components/schemas/Ratio'
        lotNumber:
          description: The assigned lot number of a batch of the specified product.
          type: string
        expirationDate:
          description: Expiration date of the medication
          $ref: '#/components/schemas/Date'
    Dosage:
      type: object
      properties:
        text:
          description: |
            Free text dosage can be used for cases where the dosage administered is too complex to code. 
            When coded dosage is present, the free text dosage may still be present for display to humans.
          type: string
        site:
          description: A SNOMED-CT coded specification of the anatomic site where the medication first entered the body.
          $ref: '#/components/schemas/Coding'
          x-valueset: https://api.usz.ch/terminology-service/value-set/approach-site-codes
          example:
            display: Below knee region
            system: http://snomed.info/sct
            code: '8289001'
        route:
          description: A SNOMED-CT code specifying the route or physiological path of administration of a therapeutic agent into or onto the patient.
          $ref: '#/components/schemas/Coding'
          x-valueset: https://api.usz.ch/terminology-service/value-set/approach-site-codes
          example:
            display: Intravenous use
            system: http://snomed.info/sct
            code: '47625008'
        dose:
          description: |
            The amount of the medication given at one administration event.
          $ref: '#/components/schemas/Quantity'
          example:
            value: 200
            unit: mg
        rate:
          description: |
            Identifies the speed with which the medication was or will be introduced into the patient. ypically, the rate for an infusion.
          $ref: '#/components/schemas/Ratio'
          example:
            numerator:
              value: 200
              unit: mg
            denominator:
              value: 3
              unit: h
    MedicationAdministration:
      title: MedicationAdministration
      description: |
        Describes the event of a patient consuming or otherwise being administered a medication. This may be as simple as swallowing
        a tablet or it may be a long running infusion. Related resources tie this event to the authorizing prescription, and the
        specific encounter between patient and health care practitioner.
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required:
            - medication
          properties:
            id:
              example: med_kis_KtaEVLFWtK2mZ6GXiWV
            resourceType:
              enum:
                - MedicationAdministration
              default: MedicationAdministration
            partOfProcedureId:
              description: Unique Id of the procedure of which this particular event is a component or step (if applicable).
              $ref: '#/components/schemas/GlobalIdentifier'
              examples:
                - pro_kis_KtaEVLFWtK2mZ6GXiWV
            status:
              description: |
                The status of the administration. 
                Generally it will be set to show that the administration has been completed. 
                For some long running administrations such as infusions, it is possible for an administration 
                to be started but not completed or it may be paused while some other process is under way.
              type: string
              enum:
                - in-progress
                - not-done
                - on-hold
                - completed
                - stopped
                - unknown
              example: completed
            category:
              description: Categorization of the hospitalization status of the patient for the medication administration.
              type: string
              enum:
                - inpatient
                - outpatient
                - community
            medication:
              description: Identifies the medication that was administered.
              $ref: '#/components/schemas/Medication'
            treatmentDateTime:
              description: Date/time of the administration (if administered within a single day)
              $ref: '#/components/schemas/DateTime'
            treatmentPeriod:
              description: Time period of administration (if administered over multiple days)
              $ref: '#/components/schemas/Period'
            terminationReason:
              description: A code indicating why the administration was terminated or not performed.
              $ref: '#/components/schemas/Coding'
              x-valueset: https://api.usz.ch/terminology-service/value-set/TBD
            dosage:
              description: Identifies the dosage that was administred.
              $ref: '#/components/schemas/Dosage'
            notes:
              description: Extra information about the medication administration that is not conveyed by the other attributes.
              type: string
            patientId:
              description: Unique global identifier of the patient
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Procedure.subject.identifier.value
            encounterId:
              description: Unique global identifier of the encounter for billing purposes of this procedure
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Procedure.encounter.identifier.value
            clinicalCaseId:
              description: Unique global identifier of the medical case related to this procedure
              $ref: '#/components/schemas/GlobalIdentifier'
            performingPractitionerId:
              description: Unique global identifier of the practitioner who performed the medication administration.
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Procedure.performer.identifier.value
            serviceRequestId:
              description: Unique global identifier of the service request
              $ref: '#/components/schemas/GlobalIdentifier'
              x-fhirpath: Procedure.request.identifier.value
            carePlanId:
              description: Unique global identifier of the care plan that this medication administration is based on
              $ref: '#/components/schemas/GlobalIdentifier'
            treatedConditionId:
              description: Unique global identifier of the condition/problem treated by this procedure
              $ref: '#/components/schemas/GlobalIdentifier'
    AdverseEvent:
      title: AdverseEvent
      type: object
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            status:
              type: string
              enum:
                - unknown
                - anticipated
                - experienced
                - resolved
              description: The status of the adverse event
            eventDate:
              type: string
              format: date-time
              description: Date and time when the adverse event occurred
            seriousness:
              type: string
              enum:
                - mild
                - moderate
                - severe
              description: The seriousness of the adverse event
            category:
              type: array
              items:
                type: string
                enum:
